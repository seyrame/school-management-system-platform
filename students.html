<!DOCTYPE html>
<html>
<head>
    <title>School Management System</title>
    <style>
        /* This is a CSS comment - it won't show on the page */
        
        /* Style for the entire page body */
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }
        
        /* Style for main heading */
        h1 {
            color: #2c3e50;
            text-align: center;
            font-size: 28px;
        }
        
        /* Style for subheading */
        h2 {
            color: #34495e;
            text-align: center;
            font-size: 18px;
            margin-bottom: 30px;
        }
        
        /* Style for the table */
        table {
            width: 95%;
            margin: 0 auto;
            border-collapse: collapse;
            background-color: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        
        /* Style for table headers (th) */
        th {
            background-color: #27ae60;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: bold;
        }
        
        /* Style for table cells (td) */
        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }
        
        /* Alternating row colors - every even row gets gray background */
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        
        /* When you hover over a row, it turns light blue */
        tr:hover {
            background-color: #e8f4f8;
        }
        /* Make the first column (ID) bold */
        td:first-child {
        font-weight: bold;
        color: #2c3e50;
        }
            /* Style attendance percentages */
    td:nth-child(5) {
        font-weight: bold;
    }

    /* Green for good attendance (≥90%) */
    td:nth-child(5):contains("9"), 
    td:nth-child(5):contains("100") {
        color: #27ae60;
    }
    </style>
</head>
<body>

    <h1>Student Management System</h1>
    <h2>Multi-School AI Platform</h2>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>Student Name</th>
            <th>Grade</th>
            <th>Subject</th>
            <th>Attendance</th>
        </tr>
        <tr>
            <td>1</td>
            <td>Emma Johnson</td>
            <td>10th</td>
            <td>Math</td>
            <td>95%</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Liam Smith</td>
            <td>10th</td>
            <td>Science</td>
            <td>88%</td>
        </tr>
        <tr>
            <td>3</td>
            <td>Sophia Garcia</td>
            <td>9th</td>
            <td>English</td>
            <td>100%</td>
        </tr>
        <tr>
            <td>4</td>
            <td>Mason Brown</td>
            <td>11th</td>
            <td>History</td>
            <td>76%</td>
        </tr>
        <tr>
            <td>5</td>
            <td>Ken Arthur</td>
            <td>12th</td>
            <td>Physics</td>
            <td>75%</td>
        </tr>
        <tr>
            <td>6</td>
            <td>Charles Dickson</td>
            <td>13th</td>
            <td>Chemistry</td>
            <td>70%</td>
        </tr>
    </table>

</body>
</html>
